<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
        #container {
            display: flex;
            height: 80vh;
            margin-top: 20px;
        }
        #map {
            flex: 1;
            background: white;
        }
        #sidebar {
            width: 300px;
            background: #f7f7f7;
            border-left: 1px solid #ccc;
            padding: 15px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<header>
    <h1>CH-Geogame — Cantons</h1>
</header>

<ul class="topnav">
    <li><a href="index.html">Communes Game</a></li>
	<li><a class="active" href="canton_game.html">Cantons Game</a></li>
	<li><a href="montagnes.html">Montagnes de plus de 4000 m</a></li>
    <li><a href="classement.html">Classement</a></li>
    <li><a href="cantons.html">Cantons</a></li>
    <li><a href="communes.html">Communes</a></li>
</ul>

<!-- Écran de démarrage -->
<div id="startScreen" style="position:fixed; top:0; left:0; width:100%; height:100%;
     background:rgba(0,0,0,0.75); z-index:10000; display:none;
     align-items:center; justify-content:center;">
  <div style="background:white; padding:36px; border-radius:12px; text-align:center; min-width:300px; box-shadow:0 8px 32px rgba(0,0,0,0.3);">
    <h2 style="margin-bottom:8px;">🗺️ Canton Game</h2>
    <p style="color:#666; margin-bottom:20px;">Entrez votre pseudonyme pour commencer</p>
    <input id="pseudoInput" type="text" placeholder="Votre pseudonyme"
           style="padding:10px; font-size:16px; width:100%; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;" />
    <br><br>
    <button id="startBtn" style="padding:10px 28px; font-size:16px; background:#D62828; color:white; border:none; border-radius:6px; cursor:pointer; width:100%;">
        Jouer
    </button>
  </div>
</div>

<!-- Conteneur principal -->
<div id="container">

    <div id="map"></div>

    <div id="sidebar">
        <button id="new">Nouveau canton</button>

        <h3>Historique des essais</h3>
        <div id="info"></div>

        <h3>Meilleur score</h3>
        <div id="best"></div>
    </div>
</div>

<div id="archive" style="margin-top:20px; padding:10px;">
    <h3>Historique des parties</h3>
</div>

<!-- Canton à trouver -->
<div id="target"
     style="position:fixed; bottom:20px; right:20px; background:white; padding:10px; border:1px solid #ccc; border-radius:6px; z-index:9999;">
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module" src="map_canton_game.js"></script>

</body>
</html>
