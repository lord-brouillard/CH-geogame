<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    #container {
        display: flex;
        height: 80vh;
        margin-top: 20px;
    }

    #map {
        flex: 1;
        background: white;
    }

    #sidebar {
        width: 300px;
        background: #f7f7f7;
        border-left: 1px solid #ccc;
        padding: 15px;
        overflow-y: auto;
    }
  </style>
</head>
<body>
<header>
  <h1>CH-Geogame - Communes</h1>
</header>
<ul class="topnav">
    <li><a href="index.html">Communes Game</a></li>
	<li><a href="canton_game.html">Cantons Game</a></li>
	<li><a href="montagnes.html">Montagnes de plus de 4000 m</a></li>
    <li><a href="classement.html">Classement</a></li>
    <li><a href="cantons.html">Cantons</a></li>
    <li><a class="active" href="communes.html">Communes</a></li>
</ul>

<div id="container">

    <!-- 🗺️ Carte -->
    <div id="map"></div>

    <!-- 📌 Panneau latéral -->
    <div id="sidebar">

        <h3>Choisir un canton</h3>
        <select id="selectCanton" style="width:100%; padding:5px; margin-bottom:15px;">
            <option value="">Tous les cantons</option>
            <option value="1">Zurich</option>
            <option value="2">Berne</option>
            <option value="3">Lucerne</option>
            <option value="4">Uri</option>
            <option value="5">Schwytz</option>
            <option value="6">Obwald</option>
            <option value="7">Nidwald</option>
            <option value="8">Glaris</option>
            <option value="9">Zoug</option>
            <option value="10">Fribourg</option>
            <option value="11">Soleure</option>
            <option value="12">Bâle-Ville</option>
            <option value="13">Bâle-Campagne</option>
            <option value="14">Schaffhouse</option>
            <option value="15">Appenzell RE</option>
            <option value="16">Appenzell RI</option>
            <option value="17">Saint-Gall</option>
            <option value="18">Grisons</option>
            <option value="19">Argovie</option>
            <option value="20">Thurgovie</option>
            <option value="21">Tessin</option>
            <option value="22">Vaud</option>
            <option value="23">Valais</option>
            <option value="24">Neuchâtel</option>
            <option value="25">Genève</option>
            <option value="26">Jura</option>
        </select>

        <h3>Rechercher une commune</h3>
        <input type="text" id="search" placeholder="Rechercher une commune" style="width:100%; padding:5px; box-sizing:border-box;">
        <div id="suggestions" class="suggestions"></div>
        <button id="btnSearch" style="margin-top:8px;">OK</button>

        <h3>Informations</h3>
        <div id="info" class="info"></div>

    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="map_communes.js"></script>
<footer></footer>
</body>
</html>
