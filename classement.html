<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classement — SwissGeo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />

    <style>
        /* ── Variables ─────────────────────────────────────────── */
        :root {
            --red:     #D62828;
            --cream:   #F5F0E8;
            --dark:    #1A1A1A;
            --mid:     #3D3D3D;
            --light:   #8A8A8A;
            --gold:    #C9A84C;
            --silver:  #9EAAB4;
            --bronze:  #B87333;
            --border:  rgba(0,0,0,0.08);
        }

        /* ── Reset ─────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Page ──────────────────────────────────────────────── */
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Background cross pattern ──────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Swiss cross accent (top-left) ─────────────────────── */
        .cross-accent {
            position: fixed;
            top: -60px;
            left: -60px;
            width: 200px;
            height: 200px;
            opacity: 0.06;
            pointer-events: none;
            z-index: 0;
        }
        .cross-accent::before,
        .cross-accent::after {
            content: '';
            position: absolute;
            background: var(--red);
            border-radius: 2px;
        }
        .cross-accent::before { width: 40%; height: 100%; left: 30%; }
        .cross-accent::after  { width: 100%; height: 40%; top: 30%; }

        /* ── Layout ────────────────────────────────────────────── */
        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 780px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        /* ── Header ────────────────────────────────────────────── */
        header {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 52px;
        }

        .flag {
            width: 44px;
            height: 44px;
            background: var(--red);
            border-radius: 4px;
            flex-shrink: 0;
            position: relative;
        }
        .flag::before, .flag::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 1px;
        }
        .flag::before { width: 35%; height: 75%; left: 32.5%; top: 12.5%; }
        .flag::after  { width: 75%; height: 35%; top: 32.5%; left: 12.5%; }

        .header-text {}
        .header-text .label {
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--light);
            margin-bottom: 4px;
        }
        .header-text h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.4rem, 6vw, 3.6rem);
            line-height: 1;
            letter-spacing: 0.04em;
            color: var(--dark);
        }
        .header-text h1 span { color: var(--red); }

        /* ── Back link ─────────────────────────────────────────── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--light);
            text-decoration: none;
            margin-bottom: 36px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--red); }
        .back-link svg { transition: transform 0.2s; }
        .back-link:hover svg { transform: translateX(-3px); }

        /* ── Stats bar ─────────────────────────────────────────── */
        .stats-bar {
            display: flex;
            gap: 2px;
            margin-bottom: 32px;
        }
        .stat {
            flex: 1;
            background: var(--dark);
            color: var(--cream);
            padding: 16px 20px;
            border-radius: 2px;
        }
        .stat:first-child { border-radius: 2px 0 0 2px; }
        .stat:last-child  { border-radius: 0 2px 2px 0; }
        .stat .stat-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.04em;
            line-height: 1;
            color: var(--gold);
        }
        .stat .stat-label {
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--silver);
            margin-top: 4px;
        }

        /* ── Table card ─────────────────────────────────────────── */
        .lb-card {
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 24px rgba(0,0,0,0.07);
        }

        .lb-header-row {
            display: grid;
            grid-template-columns: 52px 1fr 120px 100px;
            padding: 12px 24px;
            background: var(--dark);
            color: var(--light);
            font-size: 10px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        /* ── Rows ───────────────────────────────────────────────── */
        #leaderboard-list {
            display: flex;
            flex-direction: column;
        }

        .lb-row {
            display: grid;
            grid-template-columns: 52px 1fr 120px 100px;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            animation: rowIn 0.4s ease both;
            animation-delay: calc(var(--rank) * 60ms);
            transition: background 0.15s;
        }
        .lb-row:last-child { border-bottom: none; }
        .lb-row:hover { background: #fafaf8; }

        .lb-row.lb-top { background: #fffdf6; }
        .lb-row.lb-top:hover { background: #fff9e8; }

        .lb-rank {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 0.04em;
            color: var(--mid);
        }
        .lb-row:nth-child(1) .lb-rank { color: var(--gold); }
        .lb-row:nth-child(2) .lb-rank { color: var(--silver); }
        .lb-row:nth-child(3) .lb-rank { color: var(--bronze); }

        .lb-pseudo {
            font-weight: 600;
            font-size: 15px;
            color: var(--dark);
        }

        .lb-score {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.06em;
            color: var(--red);
        }

        .lb-date {
            font-size: 12px;
            color: var(--light);
            font-style: italic;
        }

        /* ── Empty / loading / error states ────────────────────── */
        .lb-loading, .lb-empty, .lb-error {
            padding: 40px 24px;
            text-align: center;
            color: var(--light);
            font-size: 14px;
            font-style: italic;
        }
        .lb-error { color: var(--red); }

        /* ── Loading spinner ───────────────────────────────────── */
        .lb-loading::before {
            content: '';
            display: block;
            width: 28px;
            height: 28px;
            border: 2px solid var(--border);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        /* ── Refresh button ────────────────────────────────────── */
        .lb-footer {
            display: flex;
            justify-content: center;
            padding: 24px;
            border-top: 1px solid var(--border);
        }
        .btn-refresh {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: transparent;
            border: 1.5px solid var(--dark);
            border-radius: 2px;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--dark);
            transition: background 0.2s, color 0.2s;
        }
        .btn-refresh:hover {
            background: var(--dark);
            color: var(--cream);
        }
        .btn-refresh svg { transition: transform 0.4s; }
        .btn-refresh:hover svg { transform: rotate(180deg); }

        /* ── Animations ────────────────────────────────────────── */
        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Responsive ────────────────────────────────────────── */
        @media (max-width: 520px) {
            .lb-header-row,
            .lb-row {
                grid-template-columns: 44px 1fr 90px;
            }
            .lb-date { display: none; }
            .lb-header-row span:last-child { display: none; }
            .stats-bar { flex-direction: column; gap: 2px; }
        }
    </style>
</head>
<body>
    <div class="cross-accent"></div>

    <div class="wrapper">

        <!-- Back link -->
        <a href="index.html" class="back-link">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Retour au jeu
        </a>

        <!-- Header -->
        <header>
            <div class="flag"></div>
            <div class="header-text">
                <p class="label">SwissGeo Challenge</p>
                <h1>Classement <span>mondial</span></h1>
            </div>
        </header>

        <!-- Filtre par canton -->
        <div style="margin-bottom: 28px;">
            <select id="filterCanton" style="width:100%; padding:10px 14px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.06em; border:1.5px solid var(--dark); border-radius:2px; background:white; color:var(--dark); cursor:pointer; appearance:none; background-image:url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%228%22 viewBox=%220 0 12 8%22><path d=%22M1 1l5 5 5-5%22 stroke=%22%231A1A1A%22 stroke-width=%221.8%22 fill=%22none%22 stroke-linecap=%22round%22/></svg>'); background-repeat:no-repeat; background-position:right 14px center;">
                <option value="">🇨🇭 Tous les cantons</option>
                <option value="Zurich">Zurich</option>
                <option value="Berne">Berne</option>
                <option value="Lucerne">Lucerne</option>
                <option value="Uri">Uri</option>
                <option value="Schwytz">Schwytz</option>
                <option value="Obwald">Obwald</option>
                <option value="Nidwald">Nidwald</option>
                <option value="Glaris">Glaris</option>
                <option value="Zoug">Zoug</option>
                <option value="Fribourg">Fribourg</option>
                <option value="Soleure">Soleure</option>
                <option value="Bâle-Ville">Bâle-Ville</option>
                <option value="Bâle-Campagne">Bâle-Campagne</option>
                <option value="Schaffhouse">Schaffhouse</option>
                <option value="Appenzell RE">Appenzell RE</option>
                <option value="Appenzell RI">Appenzell RI</option>
                <option value="Saint-Gall">Saint-Gall</option>
                <option value="Grisons">Grisons</option>
                <option value="Argovie">Argovie</option>
                <option value="Thurgovie">Thurgovie</option>
                <option value="Tessin">Tessin</option>
                <option value="Vaud">Vaud</option>
                <option value="Valais">Valais</option>
                <option value="Neuchâtel">Neuchâtel</option>
                <option value="Genève">Genève</option>
                <option value="Jura">Jura</option>
            </select>
        </div>

        <!-- Stats bar -->
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-val" id="stat-players">—</div>
                <div class="stat-label">Joueurs</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="stat-best">—</div>
                <div class="stat-label">Meilleur score</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="stat-avg">—</div>
                <div class="stat-label">Score moyen</div>
            </div>
        </div>

        <!-- Leaderboard card -->
        <div class="lb-card">
            <div class="lb-header-row">
                <span>Rang</span>
                <span>Joueur</span>
                <span>Score</span>
                <span>Date</span>
            </div>

            <div id="leaderboard-list">
                <div class="lb-loading">Chargement du classement…</div>
            </div>

            <div class="lb-footer">
                <button class="btn-refresh" id="btn-refresh">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M12 7A5 5 0 1 1 7 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M7 2L9.5 4.5L7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Actualiser
                </button>
            </div>
        </div>

    </div>

    <script type="module">
        import { db }          from './firebase-config.js';
        import { loadLeaderboard } from './leaderboard.js';
        import {
            collection, getDocs, query, orderBy, limit
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ── Charge les stats (total joueurs, best, avg) ──────────
        async function loadStats(cantonFilter = '') {
            try {
                const all = await getDocs(collection(db, "scores"));
                if (all.empty) return;

                const best = {};
                all.forEach(doc => {
                    const d      = doc.data();
                    const canton = d.canton || 'Tous les cantons';
                    if (cantonFilter && canton !== cantonFilter) return;
                    const key = d.pseudo.toLowerCase();
                    if (!best[key] || d.score > best[key]) best[key] = d.score;
                });

                const uniqueScores = Object.values(best);
                if (!uniqueScores.length) {
                    document.getElementById('stat-players').textContent = '0';
                    document.getElementById('stat-best').textContent    = '—';
                    document.getElementById('stat-avg').textContent     = '—';
                    return;
                }

                document.getElementById('stat-players').textContent = uniqueScores.length;
                document.getElementById('stat-best').textContent    = Math.max(...uniqueScores);
                document.getElementById('stat-avg').textContent     = Math.round(uniqueScores.reduce((a,b) => a+b, 0) / uniqueScores.length);
            } catch(e) {
                console.error(e);
            }
        }

        // ── Init ─────────────────────────────────────────────────
        const filterCanton = document.getElementById('filterCanton');

        function refresh() {
            const canton = filterCanton.value;
            loadLeaderboard(canton);
            loadStats(canton);
        }

        refresh();

        filterCanton.addEventListener('change', refresh);

        document.getElementById('btn-refresh').addEventListener('click', refresh);
    </script>
</body>
</html>
