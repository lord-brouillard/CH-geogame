<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <title>Classement — SwissGeo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />

    <style>
        /* ── Variables ─────────────────────────────────────────── */
        :root {
            --red:     #D62828;
            --cream:   #F5F0E8;
            --dark:    #1A1A1A;
            --mid:     #3D3D3D;
            --light:   #8A8A8A;
            --gold:    #C9A84C;
            --silver:  #9EAAB4;
            --bronze:  #B87333;
            --border:  rgba(0,0,0,0.08);
        }

        /* ── Reset ─────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Page ──────────────────────────────────────────────── */
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Background cross pattern ──────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Swiss cross accent (top-left) ─────────────────────── */
        .cross-accent {
            position: fixed;
            top: -60px;
            left: -60px;
            width: 200px;
            height: 200px;
            opacity: 0.06;
            pointer-events: none;
            z-index: 0;
        }
        .cross-accent::before,
        .cross-accent::after {
            content: '';
            position: absolute;
            background: var(--red);
            border-radius: 2px;
        }
        .cross-accent::before { width: 40%; height: 100%; left: 30%; }
        .cross-accent::after  { width: 100%; height: 40%; top: 30%; }

        /* ── Layout ────────────────────────────────────────────── */
        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 780px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        /* ── Header ────────────────────────────────────────────── */
        header {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 52px;
        }

        .flag {
            width: 44px;
            height: 44px;
            background: var(--red);
            border-radius: 4px;
            flex-shrink: 0;
            position: relative;
        }
        .flag::before, .flag::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 1px;
        }
        .flag::before { width: 35%; height: 75%; left: 32.5%; top: 12.5%; }
        .flag::after  { width: 75%; height: 35%; top: 32.5%; left: 12.5%; }

        .header-text {}
        .header-text .label {
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--light);
            margin-bottom: 4px;
        }
        .header-text h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.4rem, 6vw, 3.6rem);
            line-height: 1;
            letter-spacing: 0.04em;
            color: var(--dark);
        }
        .header-text h1 span { color: var(--red); }

        /* ── Back link ─────────────────────────────────────────── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--light);
            text-decoration: none;
            margin-bottom: 36px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--red); }
        .back-link svg { transition: transform 0.2s; }
        .back-link:hover svg { transform: translateX(-3px); }

        /* ── Stats bar ─────────────────────────────────────────── */
        .stats-bar {
            display: flex;
            gap: 2px;
            margin-bottom: 32px;
        }
        .stat {
            flex: 1;
            background: var(--dark);
            color: var(--cream);
            padding: 16px 20px;
            border-radius: 2px;
        }
        .stat:first-child { border-radius: 2px 0 0 2px; }
        .stat:last-child  { border-radius: 0 2px 2px 0; }
        .stat .stat-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.04em;
            line-height: 1;
            color: var(--gold);
        }
        .stat .stat-label {
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--silver);
            margin-top: 4px;
        }

        /* ── Table card ─────────────────────────────────────────── */
        .lb-card {
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 24px rgba(0,0,0,0.07);
        }

        .lb-header-row {
            display: grid;
            grid-template-columns: 52px 1fr 120px 100px;
            padding: 12px 24px;
            background: var(--dark);
            color: var(--light);
            font-size: 10px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        /* ── Rows ───────────────────────────────────────────────── */
        #leaderboard-list {
            display: flex;
            flex-direction: column;
        }

        .lb-row {
            display: grid;
            grid-template-columns: 52px 1fr 120px 100px;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            animation: rowIn 0.4s ease both;
            animation-delay: calc(var(--rank) * 60ms);
            transition: background 0.15s;
        }
        .lb-row:last-child { border-bottom: none; }
        .lb-row:hover { background: #fafaf8; }

        .lb-row.lb-top { background: #fffdf6; }
        .lb-row.lb-top:hover { background: #fff9e8; }

        .lb-rank {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 0.04em;
            color: var(--mid);
        }
        .lb-row:nth-child(1) .lb-rank { color: var(--gold); }
        .lb-row:nth-child(2) .lb-rank { color: var(--silver); }
        .lb-row:nth-child(3) .lb-rank { color: var(--bronze); }

        .lb-pseudo {
            font-weight: 600;
            font-size: 15px;
            color: var(--dark);
        }

        .lb-score {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.06em;
            color: var(--red);
        }

        .lb-date {
            font-size: 12px;
            color: var(--light);
            font-style: italic;
        }

        /* ── Empty / loading / error states ────────────────────── */
        .lb-loading, .lb-empty, .lb-error {
            padding: 40px 24px;
            text-align: center;
            color: var(--light);
            font-size: 14px;
            font-style: italic;
        }
        .lb-error { color: var(--red); }

        /* ── Loading spinner ───────────────────────────────────── */
        .lb-loading::before {
            content: '';
            display: block;
            width: 28px;
            height: 28px;
            border: 2px solid var(--border);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        /* ── Refresh button ────────────────────────────────────── */
        .lb-footer {
            display: flex;
            justify-content: center;
            padding: 24px;
            border-top: 1px solid var(--border);
        }
        .btn-refresh {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: transparent;
            border: 1.5px solid var(--dark);
            border-radius: 2px;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--dark);
            transition: background 0.2s, color 0.2s;
        }
        .btn-refresh:hover {
            background: var(--dark);
            color: var(--cream);
        }
        .btn-refresh svg { transition: transform 0.4s; }
        .btn-refresh:hover svg { transform: rotate(180deg); }

        /* ── Animations ────────────────────────────────────────── */
        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Responsive ────────────────────────────────────────── */
        @media (max-width: 520px) {
            .lb-header-row,
            .lb-row {
                grid-template-columns: 44px 1fr 90px;
            }
            .lb-date { display: none; }
            .lb-header-row span:last-child { display: none; }
            .stats-bar { flex-direction: column; gap: 2px; }
        }
        /* ── Tabs ───────────────────────────────────────────────── */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 28px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            border: 1.5px solid var(--dark);
            border-radius: 2px;
            background: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            cursor: pointer;
            color: var(--dark);
            transition: background 0.2s, color 0.2s;
        }
        .tab-btn:hover { background: #f0f0ec; }
        .tab-btn.active {
            background: var(--dark);
            color: var(--cream);
        }

        /* ── Playtime header row ────────────────────────────────── */
        .lb-header-row.pt-header {
            grid-template-columns: 52px 1fr 140px;
        }
        .lb-row.pt-row {
            grid-template-columns: 52px 1fr 140px;
        }
    </style>
</head>

    <script type="module">
        import { db }                from './firebase-config.js';
        import { loadLeaderboard }   from './leaderboard.js';
        import { getAllPlaytimes, formatTime } from './tracker.js';
        import './tracker.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ── Stats bar ────────────────────────────────────────────
        async function loadStats(cantonFilter = 'tous') {
            try {
                const all = await getDocs(collection(db, "scores"));
                if (all.empty) return;

                const isAllModes = (cantonFilter === 'tous');
                const best = {};
                let totalGames = 0;

                all.forEach(doc => {
                    const d      = doc.data();
                    const canton = d.canton || 'Toute la Suisse';
                    if (!isAllModes && canton !== cantonFilter) return;
                    totalGames++;
                    const key = d.pseudo.toLowerCase();
                    if (!best[key] || d.score > best[key]) best[key] = d.score;
                });

                const uniqueScores = Object.values(best);
                document.getElementById('stat-players').textContent = uniqueScores.length || '0';
                document.getElementById('stat-games').textContent   = totalGames || '0';
            } catch(e) { console.error(e); }
        }

        // ── Classement temps de jeu ──────────────────────────────
        async function loadPlaytimeLeaderboard() {
            const container = document.getElementById('playtime-list');
            container.innerHTML = `<div class="lb-loading">Chargement…</div>`;
            try {
                const data = await getAllPlaytimes();
                if (!data.length) {
                    container.innerHTML = `<div class="lb-empty">Aucun temps enregistré pour l'instant.</div>`;
                    return;
                }
                const TOP_N = 10;
                let html = '';
                data.slice(0, TOP_N).forEach((d, i) => {
                    const rank  = i + 1;
                    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
                    const time  = formatTime(d.seconds || 0);
                    html += `
                    <div class="lb-row pt-row ${rank <= 3 ? 'lb-top' : ''}" style="--rank:${rank}">
                        <span class="lb-rank">${medal}</span>
                        <span class="lb-pseudo">${escapeHtml(d.pseudo)}</span>
                        <span class="lb-score">${time}</span>
                    </div>`;
                });
                container.innerHTML = html;
            } catch(e) {
                container.innerHTML = `<div class="lb-error">Impossible de charger.</div>`;
            }
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // ── Onglets ──────────────────────────────────────────────
        const tabScores    = document.getElementById('tab-scores');
        const tabPlaytime  = document.getElementById('tab-playtime');
        const panelScores  = document.getElementById('panel-scores');
        const panelPT      = document.getElementById('panel-playtime');

        tabScores.addEventListener('click', () => {
            tabScores.classList.add('active');
            tabPlaytime.classList.remove('active');
            panelScores.style.display = '';
            panelPT.style.display = 'none';
        });

        tabPlaytime.addEventListener('click', () => {
            tabPlaytime.classList.add('active');
            tabScores.classList.remove('active');
            panelPT.style.display = '';
            panelScores.style.display = 'none';
            loadPlaytimeLeaderboard();
        });

        // ── Scores ───────────────────────────────────────────────
        const filterCanton = document.getElementById('filterCanton');

        function refresh() {
            const canton = filterCanton.value;
            loadLeaderboard(canton === 'tous' ? '' : canton);
            loadStats(canton);
        }

        refresh();
        filterCanton.addEventListener('change', refresh);
        document.getElementById('btn-refresh').addEventListener('click', refresh);
        document.getElementById('btn-refresh-pt').addEventListener('click', loadPlaytimeLeaderboard);
    </script>
